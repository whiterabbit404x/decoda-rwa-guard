[pytest]
testpaths =
    services/api/tests
    services/risk-engine/tests
    services/threat-engine/tests
    services/compliance-service/tests
    services/reconciliation-service/tests
addopts = --import-mode=importlib
markers =
    integration: marks real integration harness tests that require local services/runtime dependencies

[coverage:run]
source = services/api/app
omit =
    */tests/*
    */__pycache__/*
    */migrations/*

[coverage:report]
# Minimum coverage threshold; CI fails if this is not met.
# Set to 65% based on current codebase coverage — raise incrementally.
fail_under = 65
show_missing = true
