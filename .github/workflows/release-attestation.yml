name: Authoritative Release Attestation

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: Immutable identifier of the deployed release
        required: true
        type: string
      environment:
        description: GitHub production-like environment containing the probe URL and signing key
        required: true
        type: environment

permissions:
  contents: read

concurrency:
  group: release-attestation-${{ github.event.inputs.deployment_id }}
  cancel-in-progress: false

jobs:
  attest-release:
    name: Strict production-like release attestation
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 30
    env:
      EXPECTED_COMMIT_SHA: ${{ github.sha }}
      RELEASE_DEPLOYMENT_ID: ${{ inputs.deployment_id }}
      CI_RUN_ID: ${{ github.run_id }}
      RELEASE_PROBE_URL: ${{ secrets.RELEASE_PROBE_URL }}
      RELEASE_PROBE_TOKEN: ${{ secrets.RELEASE_PROBE_TOKEN }}
      RELEASE_ATTESTATION_SIGNING_KEY: ${{ secrets.RELEASE_ATTESTATION_SIGNING_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install attestation dependency
        run: python -m pip install cryptography==46.0.5

      - name: Reject missing release authority inputs
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RELEASE_PROBE_URL" || { echo 'RELEASE_PROBE_URL is required'; exit 1; }
          test -n "$RELEASE_PROBE_TOKEN" || { echo 'RELEASE_PROBE_TOKEN is required'; exit 1; }
          test -n "$RELEASE_ATTESTATION_SIGNING_KEY" || { echo 'RELEASE_ATTESTATION_SIGNING_KEY is required'; exit 1; }
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT_SHA"

      - name: Collect all runtime probes and security gates from one deployment
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-all-errors --max-time 120 \
            -H "Authorization: Bearer $RELEASE_PROBE_TOKEN" \
            -H "X-Expected-Commit-SHA: $EXPECTED_COMMIT_SHA" \
            -H "X-Deployment-ID: $RELEASE_DEPLOYMENT_ID" \
            -H "X-CI-Run-ID: $CI_RUN_ID" \
            "$RELEASE_PROBE_URL" > release-evidence.json

      - name: Create immutable signed strict attestation
        run: |
          python scripts/release_attestation.py create \
            --evidence release-evidence.json \
            --commit-sha "$EXPECTED_COMMIT_SHA" \
            --deployment-id "$RELEASE_DEPLOYMENT_ID" \
            --ci-run-id "$CI_RUN_ID"

      - name: Verify signature, commit binding, and immutable path
        run: |
          python scripts/release_attestation.py verify \
            --directory "artifacts/release-attestations/$EXPECTED_COMMIT_SHA/$RELEASE_DEPLOYMENT_ID" \
            --commit-sha "$EXPECTED_COMMIT_SHA"

      - name: Upload immutable release attestation
        uses: actions/upload-artifact@v4
        with:
          name: release-attestation-${{ github.sha }}-${{ inputs.deployment_id }}
          path: artifacts/release-attestations/${{ github.sha }}/${{ inputs.deployment_id }}/
          if-no-files-found: error
          retention-days: 90
          overwrite: false
