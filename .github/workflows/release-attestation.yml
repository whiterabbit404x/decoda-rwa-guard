name: Authoritative Release Attestation

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: Immutable identifier of the deployed release
        required: true
        type: string
      environment:
        description: Protected GitHub production environment containing the probe URL and signing key
        required: true
        type: environment
      image_ref:
        description: Immutable production image reference including sha256 digest
        required: true
        type: string
      penetration_test_evidence:
        description: Approved evidence URI or ticket for independent penetration testing/retest scope
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  packages: read
  attestations: write

concurrency:
  group: release-attestation-${{ github.event.inputs.deployment_id }}
  cancel-in-progress: false

jobs:
  attest-release:
    name: Strict production release attestation
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 45
    env:
      EXPECTED_COMMIT_SHA: ${{ github.sha }}
      RELEASE_ENVIRONMENT: ${{ inputs.environment }}
      RELEASE_DEPLOYMENT_ID: ${{ inputs.deployment_id }}
      CI_RUN_ID: ${{ github.run_id }}
      RELEASE_IMAGE_REF: ${{ inputs.image_ref }}
      PENTEST_EVIDENCE: ${{ inputs.penetration_test_evidence }}
      RELEASE_PROBE_URL: ${{ secrets.RELEASE_PROBE_URL }}
      RELEASE_PROBE_TOKEN: ${{ secrets.RELEASE_PROBE_TOKEN }}
      RELEASE_ATTESTATION_SIGNING_KEY: ${{ secrets.RELEASE_ATTESTATION_SIGNING_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Reject missing release authority inputs
        shell: bash
        run: |
          set -euo pipefail
          test "$RELEASE_ENVIRONMENT" = "production" || { echo 'only the protected production environment is release-authoritative'; exit 1; }
          test -n "$RELEASE_PROBE_URL" || { echo 'RELEASE_PROBE_URL is required'; exit 1; }
          test -n "$RELEASE_PROBE_TOKEN" || { echo 'RELEASE_PROBE_TOKEN is required'; exit 1; }
          test -n "$RELEASE_ATTESTATION_SIGNING_KEY" || { echo 'RELEASE_ATTESTATION_SIGNING_KEY is required'; exit 1; }
          test -n "$PENTEST_EVIDENCE" || { echo 'independent penetration-test evidence is required'; exit 1; }
          [[ "$RELEASE_IMAGE_REF" =~ ^[^[:space:]@]+@sha256:[0-9a-f]{64}$ ]] || { echo 'image_ref must be an immutable sha256 digest reference'; exit 1; }
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT_SHA"
          mkdir -p artifacts/release-security
          printf '%s\n' "$PENTEST_EVIDENCE" > artifacts/release-security/penetration-test-evidence.txt
          printf '%s\n' "$EXPECTED_COMMIT_SHA" > artifacts/release-security/commit-sha.txt
          printf '%s\n' "$RELEASE_IMAGE_REF" > artifacts/release-security/image-ref.txt

      - name: Dependency scanning
        run: |
          python -m pip install pip-audit==2.9.0
          pip-audit -r requirements-local.txt --format json --output artifacts/release-security/pip-audit.json
          npm audit --omit=dev --json > artifacts/release-security/npm-audit.json

      - name: Generate source dependency SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: artifacts/release-security/source-sbom.cdx.json

      - name: Scan immutable final container
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ inputs.image_ref }}
          format: sarif
          output: artifacts/release-security/container-scan.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          exit-code: "1"

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.image_ref }}
          format: spdx-json
          output-file: artifacts/release-security/image-sbom.spdx.json

      - name: Install signature verifier
        uses: sigstore/cosign-installer@v3.10.0

      - name: Verify keyless image signature and SLSA provenance
        shell: bash
        run: |
          set -euo pipefail
          cosign verify "$RELEASE_IMAGE_REF" \
            --certificate-identity-regexp 'https://github.com/.+/.github/workflows/.+' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            > artifacts/release-security/cosign-verification.json
          cosign verify-attestation "$RELEASE_IMAGE_REF" --type slsaprovenance \
            --certificate-identity-regexp 'https://github.com/.+/.github/workflows/.+' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            > artifacts/release-security/provenance-verification.json

      - name: Install attestation dependency
        run: python -m pip install cryptography==46.0.5

      - name: Collect all runtime probes and security gates from one deployment
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-all-errors --max-time 120 \
            -H "Authorization: Bearer $RELEASE_PROBE_TOKEN" \
            -H "X-Expected-Commit-SHA: $EXPECTED_COMMIT_SHA" \
            -H "X-Deployment-ID: $RELEASE_DEPLOYMENT_ID" \
            -H "X-Expected-Image-Ref: $RELEASE_IMAGE_REF" \
            -H "X-CI-Run-ID: $CI_RUN_ID" \
            "$RELEASE_PROBE_URL" > release-evidence.json

      - name: Create immutable signed strict attestation
        run: |
          python scripts/release_attestation.py create \
            --evidence release-evidence.json \
            --commit-sha "$EXPECTED_COMMIT_SHA" \
            --deployment-id "$RELEASE_DEPLOYMENT_ID" \
            --ci-run-id "$CI_RUN_ID" \
            --image-ref "$RELEASE_IMAGE_REF" \
            --penetration-test-evidence "$PENTEST_EVIDENCE"

      - name: Verify signature, commit binding, and immutable path
        run: |
          python scripts/release_attestation.py verify \
            --directory "artifacts/release-attestations/$EXPECTED_COMMIT_SHA/$RELEASE_DEPLOYMENT_ID" \
            --commit-sha "$EXPECTED_COMMIT_SHA" \
            --deployment-id "$RELEASE_DEPLOYMENT_ID" \
            --image-ref "$RELEASE_IMAGE_REF"

      - name: Build SOC 2 control evidence index
        shell: bash
        run: |
          set -euo pipefail
          sha256sum artifacts/release-security/* > artifacts/release-security/SHA256SUMS
          cat > artifacts/release-security/soc2-control-index.json <<EOF
          {"commit_sha":"${EXPECTED_COMMIT_SHA}","workflow_run_id":"${CI_RUN_ID}","controls":{"CC6":["cosign-verification.json"],"CC7":["pip-audit.json","npm-audit.json","container-scan.sarif"],"CC8":["commit-sha.txt","SHA256SUMS","provenance-verification.json"],"A1":["release-attestation"],"C1":["source-sbom.cdx.json","image-sbom.spdx.json"]}}
          EOF

      - name: Upload immutable release attestation
        uses: actions/upload-artifact@v4
        with:
          name: release-attestation-${{ github.sha }}-${{ inputs.deployment_id }}
          path: |
            artifacts/release-attestations/${{ github.sha }}/${{ inputs.deployment_id }}/
            artifacts/release-security/
          if-no-files-found: error
          retention-days: 365
          overwrite: false
