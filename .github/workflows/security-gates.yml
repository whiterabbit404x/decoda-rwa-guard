name: Security Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'release/**'
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-and-static-analysis:
    name: Dependency audit and static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            services/*/requirements*.txt
            requirements-local.txt

      - name: Install pinned application and security-audit dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-local.txt
          python -m pip install pip-audit==2.7.3 bandit==1.7.9

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements-local.txt --strict

      - name: Run Python static security analysis
        run: bandit -r services scripts phase1_local -x services/api/tests -ll -ii

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install locked JavaScript dependencies
        run: npm ci

      - name: Audit JavaScript production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Type-check the web application
        run: npx tsc --noEmit -p apps/web/tsconfig.json

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            --config .gitleaks.toml
            --redact
            --exit-code 1
            --report-format sarif
            --report-path gitleaks-report.sarif

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif

  migration-validation:
    name: Migration validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: decoda
          POSTGRES_PASSWORD: decoda-ci-only
          POSTGRES_DB: decoda
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U decoda -d decoda"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://decoda:decoda-ci-only@127.0.0.1:5432/decoda
      MIGRATION_FAIL_OPEN: 'false'
      ENVIRONMENT: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate migration history
        run: python scripts/security/validate_migrations.py

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install API dependencies
        run: python -m pip install -r services/api/requirements.txt

      - name: Apply all migrations to ephemeral PostgreSQL
        run: python services/api/scripts/migrate.py

      - name: Verify migration re-run is idempotent
        run: python services/api/scripts/migrate.py

  container-and-sbom:
    name: Container scan and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production API image
        run: docker build --tag decoda-api:${{ github.sha }} --file services/api/Dockerfile .

      - name: Scan production image for high and critical vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: decoda-api:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Generate CycloneDX software bill of materials
        if: always()
        uses: anchore/sbom-action@v0.17.2
        with:
          image: decoda-api:${{ github.sha }}
          format: cyclonedx-json
          output-file: decoda-api-sbom.cdx.json

      - name: Upload software bill of materials
        if: always() && hashFiles('decoda-api-sbom.cdx.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: decoda-api-sbom-${{ github.run_id }}
          path: decoda-api-sbom.cdx.json
          retention-days: 90
          if-no-files-found: error
