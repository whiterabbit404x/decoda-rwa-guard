name: CI Release Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  paid-launch-readiness-gates:
    name: Paid launch billing/email/provider readiness gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt

      - name: Run paid launch readiness tests
        run: python -m pytest services/api/tests/test_paid_launch_readiness.py -q


  required-gates:
    name: Required npm test/build gates
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm test
        run: npm test

      - name: Run npm run build
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt
          if [ -f requirements-local.txt ]; then python -m pip install -r requirements-local.txt; fi

      - name: Run release proof artifact tests
        run: |
          python -m pytest services/api/tests/test_release_proof_artifacts.py -q


  mandatory-security-supply-chain-gates:
    name: Mandatory security and supply-chain gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-trivy tags before v0.2.6 were deleted after the March 2026
      # supply-chain incident. Pin the verified v0.2.6 commit and a known-safe,
      # immutable Trivy release instead of relying on a mutable/deleted tag.
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.69.3
          cache: true

      - name: Scan repository for vulnerabilities and exposed secrets
        run: >-
          trivy fs
          --scanners vuln,secret,misconfig
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --exit-code 1
          .


  final-readiness-gate:
    name: Final 100% readiness gate (fail-closed)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [paid-launch-readiness-gates, required-gates, mandatory-security-supply-chain-gates]
    if: ${{ needs.paid-launch-readiness-gates.result == 'success' && needs.required-gates.result == 'success' && needs.mandatory-security-supply-chain-gates.result == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt
          if [ -f requirements-local.txt ]; then python -m pip install -r requirements-local.txt; fi

      - name: Run paid launch readiness tests
        run: python -m pytest services/api/tests/test_paid_launch_readiness.py -q

      - name: Run release proof artifact tests
        run: python -m pytest services/api/tests/test_release_proof_artifacts.py -q

      - name: Run evidence export truthfulness tests
        run: python -m pytest services/api/tests/test_evidence_export_truthfulness.py -q

      - name: Run runtime truthfulness tests
        run: python -m pytest services/api/tests/test_runtime_truthfulness.py -q

      - name: Run SaaS workflow validation tests
        run: python -m pytest services/api/tests/test_saas_workflow_validation.py -q

      - name: Run 100% readiness gate tests
        run: python -m pytest services/api/tests/test_100_percent_readiness.py -q

      - name: Run staging launch proof tests
        run: python -m pytest services/api/tests/test_staging_launch_proof.py -q

      - name: Generate local fail-closed launch proof and release proof
        # Step A+B: generate_release_proof.py internally generates the launch-proof
        # first, then generates ci-required-gates, release-proof summary,
        # test-report, and manifest — all in one atomic call so the manifest
        # always hashes the freshly-generated launch-proof.
        env:
          CI_RUN_ID: ${{ github.run_id }}
          RELEASE_DEPLOYMENT_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}
          RELEASE_ENVIRONMENT: ci
        run: python scripts/generate_release_proof.py --mode ci

      - name: Validate release proof
        # Step C: manifest SHA256 must match the launch-proof written in step A+B.
        run: python scripts/validate_release_proof.py

      - name: Generate staging launch proof (fail-closed local/ci mode)
        # In PR/CI: always fail-closed local mode; no real staging credentials.
        # Staging environment workflow uses --mode staging --strict with real secrets.
        # To enable GitHub environment protection for staging, see docs/STAGING_GO_LIVE_VALIDATION.md.
        run: python scripts/generate_staging_launch_proof.py --mode ci

      - name: Validate staging launch proof artifact
        run: python scripts/validate_staging_launch_proof.py

      - name: Validate 100% readiness (fail-closed, non-strict)
        run: python scripts/validate_100_percent_readiness.py --mode ci

      - name: Upload final readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-readiness-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            artifacts/launch-proof/latest/summary.json
            artifacts/release-proof/latest/summary.json
            artifacts/release-proof/latest/ci-required-gates.json
            artifacts/staging-proof/latest/summary.json
            artifacts/final-readiness/local-test/summary.json
