name: CI Release Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'release/**'
  workflow_dispatch:

jobs:
  paid-launch-readiness-gates:
    name: Paid launch billing/email/provider readiness gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        run: pip install pytest

      - name: Run paid launch readiness tests
        run: python -m pytest services/api/tests/test_paid_launch_readiness.py -q

      - name: Build paid launch readiness proof artifact
        if: always()
        run: |
          set -euo pipefail
          mkdir -p artifacts/release-proof/latest
          python - <<'PYEOF'
          import json, os, sys
          sys.path.insert(0, '.')
          from services.api.app.paid_launch_readiness import build_paid_launch_readiness
          result = build_paid_launch_readiness()
          proof = {
            'paid_launch_readiness': {
              'billing_ready': result['billing_ready'],
              'billing_webhook_ready': result['billing_webhook_ready'],
              'email_ready': result['email_ready'],
              'provider_ready': result['provider_ready'],
              'paid_launch_ready': result['paid_launch_ready'],
              'paid_launch_status': result['paid_launch_status'],
              'blockers': result['paid_launch_blockers'],
            }
          }
          path = 'artifacts/release-proof/latest/paid-launch-readiness.json'
          with open(path, 'w') as f:
            json.dump(proof, f, indent=2)
          print(json.dumps(proof, indent=2))
          PYEOF

      - name: Upload paid launch readiness proof artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paid-launch-readiness-proof-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: artifacts/release-proof/latest/paid-launch-readiness.json

  required-gates:
    name: Required npm test/build gates
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm test
        run: npm test

      - name: Run npm run build
        run: npm run build

      - name: Build CI release proof bundle
        if: always()
        run: |
          set -euo pipefail
          mkdir -p artifacts/release-proof/latest
          {
            echo "# CI release gate proof"
            echo
            echo "- workflow: ${GITHUB_WORKFLOW}"
            echo "- run_id: ${GITHUB_RUN_ID}"
            echo "- run_number: ${GITHUB_RUN_NUMBER}"
            echo "- run_attempt: ${GITHUB_RUN_ATTEMPT}"
            echo "- actor: ${GITHUB_ACTOR}"
            echo "- ref: ${GITHUB_REF}"
            echo "- sha: ${GITHUB_SHA}"
            echo "- test_gate: completed"
            echo "- build_gate: completed"
            echo
            echo "See uploaded artifacts for raw logs and gate status snapshots."
          } > artifacts/release-proof/latest/ci-required-gates.md

          cat > artifacts/release-proof/latest/ci-required-gates.json <<JSON
          {
            "workflow": "${GITHUB_WORKFLOW}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "actor": "${GITHUB_ACTOR}",
            "ref": "${GITHUB_REF}",
            "sha": "${GITHUB_SHA}",
            "gates": {
              "npm_test": "completed",
              "npm_run_build": "completed"
            }
          }
JSON

      - name: Upload CI release proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-release-gate-proof-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: |
            artifacts/release-proof/latest/ci-required-gates.md
            artifacts/release-proof/latest/ci-required-gates.json
