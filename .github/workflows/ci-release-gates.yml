name: CI Release Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'release/**'
  workflow_dispatch:

jobs:
  paid-launch-readiness-gates:
    name: Paid launch billing/email/provider readiness gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Provider / live monitoring secrets
      EVM_RPC_URL: ${{ secrets.EVM_RPC_URL }}
      EVM_CHAIN_ID: ${{ secrets.EVM_CHAIN_ID }}
      STAGING_EVM_RPC_URL: ${{ secrets.STAGING_EVM_RPC_URL }}
      STAGING_EVM_CHAIN_ID: ${{ secrets.STAGING_EVM_CHAIN_ID }}
      STAGING_WORKER_ENABLED: ${{ secrets.STAGING_WORKER_ENABLED }}
      WORKER_ENABLED: ${{ secrets.STAGING_WORKER_ENABLED }}
      LIVE_MONITORING_ENABLED: ${{ secrets.LIVE_MONITORING_ENABLED }}
      MONITORING_INGESTION_MODE: ${{ secrets.MONITORING_INGESTION_MODE }}
      LIVE_PROVIDER_PROOF_PRESENT: ${{ secrets.LIVE_PROVIDER_PROOF_PRESENT }}
      # Billing secrets (Stripe is the supported live billing provider in code)
      BILLING_PROVIDER: ${{ secrets.BILLING_PROVIDER }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
      # Email secrets (one of sendgrid / resend / smtp is required)
      EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_DOMAIN: ${{ secrets.EMAIL_DOMAIN }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt

      - name: Run paid launch readiness tests
        run: python -m pytest services/api/tests/test_paid_launch_readiness.py -q

      - name: Diagnose paid launch env presence
        run: |
          python - <<'PY'
          import os
          names = [
            "EVM_RPC_URL",
            "EVM_CHAIN_ID",
            "STAGING_EVM_RPC_URL",
            "STAGING_EVM_CHAIN_ID",
            "STAGING_WORKER_ENABLED",
            "WORKER_ENABLED",
            "LIVE_MONITORING_ENABLED",
            "MONITORING_INGESTION_MODE",
            "LIVE_PROVIDER_PROOF_PRESENT",
            "BILLING_PROVIDER",
            "STRIPE_SECRET_KEY",
            "STRIPE_WEBHOOK_SECRET",
            "STRIPE_PRICE_ID",
            "EMAIL_PROVIDER",
            "EMAIL_FROM",
            "EMAIL_DOMAIN",
            "RESEND_API_KEY",
            "SENDGRID_API_KEY",
            "SMTP_HOST",
            "SMTP_USER",
            "SMTP_PASSWORD",
            "STAGING_API_URL",
            "STAGING_APP_URL",
            "STAGING_DATABASE_URL",
            "STAGING_AUTH_TOKEN_SECRET",
          ]
          for name in names:
            print(f"{name}: {'present' if os.getenv(name) else 'missing'}")
          PY

      - name: Run paid launch reads
        run: |
          python - <<'PY'
          import os, sys
          sys.path.insert(0, '.')
          from services.api.app.paid_launch_readiness import build_paid_launch_readiness

          out = build_paid_launch_readiness()

          # Per-section readiness summary (never prints secret values).
          sections = [
              ("billing_ready", out.get("billing_ready"), out.get("billing_status"), out.get("billing_missing_env", [])),
              ("billing_webhook_ready", out.get("billing_webhook_ready"), out.get("billing_webhook_status"), []),
              ("email_ready", out.get("email_ready"), out.get("email_status"), out.get("email_missing_env", [])),
              ("provider_ready", out.get("provider_ready"), out.get("provider_status"), out.get("provider_missing_env", [])),
              ("live_monitoring_ready", out.get("live_provider_proof_ready"), "ready" if out.get("live_provider_proof_ready") else "blocked", []),
          ]
          print("Paid launch readiness sections:")
          for name, ready, status, missing in sections:
              print(f"  - {name}={ready} ({status})")
              if missing:
                  print(f"      missing_env: {sorted(set(missing))}")

          # Deduplicated missing-secret list across sections.
          seen = set()
          missing_secrets = []
          for m in (
              out.get("provider_missing_env", [])
              + out.get("billing_missing_env", [])
              + out.get("email_missing_env", [])
          ):
              if m and m not in seen:
                  seen.add(m)
                  missing_secrets.append(m)

          paid_launch_ready = bool(out.get("paid_launch_ready"))
          print(f"paid_launch_ready={paid_launch_ready} ({out.get('paid_launch_status')})")

          if not paid_launch_ready:
              failing_sections = [name for name, ready, _, _ in sections if not ready]
              print("Paid launch gate FAILED.")
              print(f"  failing_sections: {failing_sections}")
              if missing_secrets:
                  print(
                      "  missing_secrets (set these GitHub Actions secrets to unblock): "
                      + ", ".join(missing_secrets)
                  )
              else:
                  print("  missing_secrets: <none reported; failure is from blockers below>")
              blockers = out.get("paid_launch_blockers") or []
              if blockers:
                  print("  blockers:")
                  for b in blockers:
                      print(f"    - {b}")
              sys.exit(1)

          print("Paid launch gate: all required secrets present and readiness checks pass.")
          PY

      - name: Generate release proof artifacts
        if: always()
        run: |
          python scripts/generate_release_proof.py --mode ci

      - name: Validate release proof artifacts
        if: always()
        run: |
          python scripts/validate_release_proof.py

      - name: Upload release proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-proof-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            artifacts/release-proof/latest/
            artifacts/launch-proof/latest/

  required-gates:
    name: Required npm test/build gates
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm test
        run: npm test

      - name: Run npm run build
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt
          if [ -f requirements-local.txt ]; then python -m pip install -r requirements-local.txt; fi

      - name: Run release proof artifact tests
        if: always()
        run: |
          python -m pytest services/api/tests/test_release_proof_artifacts.py -q

      - name: Generate canonical release proof artifacts
        if: always()
        run: |
          python scripts/generate_release_proof.py --mode ci

      - name: Validate canonical release proof artifacts
        if: always()
        run: |
          python scripts/validate_release_proof.py

      - name: Upload canonical release proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-release-gate-proof-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            artifacts/release-proof/latest/
            artifacts/launch-proof/latest/

  final-readiness-gate:
    name: Final 100% readiness gate (fail-closed)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [paid-launch-readiness-gates, required-gates]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt
          if [ -f requirements-local.txt ]; then python -m pip install -r requirements-local.txt; fi

      - name: Run paid launch readiness tests
        run: python -m pytest services/api/tests/test_paid_launch_readiness.py -q

      - name: Run release proof artifact tests
        run: python -m pytest services/api/tests/test_release_proof_artifacts.py -q

      - name: Run evidence export truthfulness tests
        run: python -m pytest services/api/tests/test_evidence_export_truthfulness.py -q

      - name: Run runtime truthfulness tests
        run: python -m pytest services/api/tests/test_runtime_truthfulness.py -q

      - name: Run SaaS workflow validation tests
        run: python -m pytest services/api/tests/test_saas_workflow_validation.py -q

      - name: Run 100% readiness gate tests
        run: python -m pytest services/api/tests/test_100_percent_readiness.py -q

      - name: Run staging launch proof tests
        run: python -m pytest services/api/tests/test_staging_launch_proof.py -q

      - name: Generate release proof
        if: always()
        run: python scripts/generate_release_proof.py --mode ci

      - name: Validate release proof
        if: always()
        run: python scripts/validate_release_proof.py

      - name: Generate staging launch proof (fail-closed local/ci mode)
        # In PR/CI: always fail-closed local mode; no real staging credentials.
        # Staging environment workflow uses --mode staging --strict with real secrets.
        # To enable GitHub environment protection for staging, see docs/STAGING_GO_LIVE_VALIDATION.md.
        if: always()
        run: python scripts/generate_staging_launch_proof.py --mode ci

      - name: Validate staging launch proof artifact
        if: always()
        run: python scripts/validate_staging_launch_proof.py

      - name: Validate 100% readiness (fail-closed, non-strict)
        if: always()
        run: python scripts/validate_100_percent_readiness.py --mode ci

      - name: Upload final readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-readiness-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            artifacts/launch-proof/latest/summary.json
            artifacts/release-proof/latest/summary.json
            artifacts/release-proof/latest/ci-required-gates.json
            artifacts/staging-proof/latest/summary.json
            artifacts/final-readiness/latest/summary.json
