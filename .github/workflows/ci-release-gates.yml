name: CI Release Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'release/**'
  workflow_dispatch:

jobs:
  paid-launch-readiness-gates:
    name: Paid launch billing/email/provider readiness gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        run: pip install pytest

      - name: Run paid launch readiness tests
        run: python -m pytest services/api/tests/test_paid_launch_readiness.py -q

      - name: Generate release proof artifacts
        if: always()
        run: |
          python scripts/generate_release_proof.py --mode ci

      - name: Validate release proof artifacts
        if: always()
        run: |
          python scripts/validate_release_proof.py

      - name: Upload release proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-proof-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            artifacts/release-proof/latest/
            artifacts/launch-proof/latest/

  required-gates:
    name: Required npm test/build gates
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm test
        run: npm test

      - name: Run npm run build
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements-local.txt

      - name: Generate canonical release proof artifacts
        if: always()
        run: |
          python scripts/generate_release_proof.py --mode ci

      - name: Validate canonical release proof artifacts
        if: always()
        run: |
          python scripts/validate_release_proof.py

      - name: Upload canonical release proof artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-release-gate-proof-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            artifacts/release-proof/latest/
            artifacts/launch-proof/latest/
