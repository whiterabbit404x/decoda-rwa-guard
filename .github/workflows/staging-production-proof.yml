name: Staging Production Proof

# Two-tier workflow proving staging deployment health.
#
#   1. structural-fail-closed-validation
#        Runs on every trigger without any staging secrets.
#        Proves the repo fails closed when env vars are absent.
#
#   2. real-staging-production-proof
#        Runs on workflow_dispatch or push to main/master.
#        Reads STAGING_* repository secrets and proves real staging health.
#        Fails clearly if any required secret is missing or any check fails.
#
# Secret values are never echoed. GitHub Actions masks them and the scripts
# print only yes/no presence flags.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  structural-fail-closed-validation:
    name: Structural fail-closed validation (no secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt

      - name: Unset all STAGING_* env vars and run structural proof
        env:
          STAGING_API_URL: ''
          STAGING_APP_URL: ''
          STAGING_AUTH_TOKEN_SECRET: ''
          STAGING_DATABASE_URL: ''
          STAGING_WORKER_ENABLED: ''
          STAGING_EVM_RPC_URL: ''
          STAGING_EVM_CHAIN_ID: ''
          EVM_RPC_URL: ''
          EVM_CHAIN_ID: ''
        run: |
          python scripts/generate_staging_launch_proof.py \
            --mode structural \
            --out artifacts/staging-production-proof/structural/summary.json

      - name: Validate proof is fail-closed (no secrets => must fail)
        run: |
          python scripts/validate_staging_launch_proof.py \
            --expect-fail-closed \
            --proof artifacts/staging-production-proof/structural/summary.json

      - name: Run staging launch proof tests
        env:
          STAGING_API_URL: ''
          STAGING_APP_URL: ''
          STAGING_AUTH_TOKEN_SECRET: ''
          STAGING_DATABASE_URL: ''
          STAGING_WORKER_ENABLED: ''
          STAGING_EVM_RPC_URL: ''
          EVM_RPC_URL: ''
        run: |
          python -m pytest services/api/tests/test_staging_launch_proof.py \
            services/api/tests/test_staging_production_proof.py \
            -q --tb=short || \
          python -m pytest services/api/tests/test_staging_launch_proof.py -q --tb=short

      - name: Upload structural proof artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-production-proof-structural
          retention-days: 30
          path: artifacts/staging-production-proof/structural/summary.json

  real-staging-production-proof:
    name: Real staging production proof (uses STAGING_* secrets)
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
      STAGING_APP_URL: ${{ secrets.STAGING_APP_URL }}
      STAGING_AUTH_TOKEN_SECRET: ${{ secrets.STAGING_AUTH_TOKEN_SECRET }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      STAGING_WORKER_ENABLED: ${{ secrets.STAGING_WORKER_ENABLED }}
      STAGING_EVM_RPC_URL: ${{ secrets.STAGING_EVM_RPC_URL }}
      STAGING_EVM_CHAIN_ID: ${{ secrets.STAGING_EVM_CHAIN_ID }}
      EVM_RPC_URL: ${{ secrets.EVM_RPC_URL }}
      EVM_CHAIN_ID: ${{ secrets.EVM_CHAIN_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt

      - name: Mask all sensitive values
        run: |
          # Mask every secret so values never appear in logs.
          # Only yes/no presence is printed below.
          if [ -n "$STAGING_API_URL" ]; then
            echo "::add-mask::$STAGING_API_URL"
          fi
          if [ -n "$STAGING_APP_URL" ]; then
            echo "::add-mask::$STAGING_APP_URL"
          fi
          if [ -n "$STAGING_AUTH_TOKEN_SECRET" ]; then
            echo "::add-mask::$STAGING_AUTH_TOKEN_SECRET"
          fi
          if [ -n "$STAGING_DATABASE_URL" ]; then
            echo "::add-mask::$STAGING_DATABASE_URL"
          fi
          if [ -n "$STAGING_EVM_RPC_URL" ]; then
            echo "::add-mask::$STAGING_EVM_RPC_URL"
          fi
          if [ -n "$EVM_RPC_URL" ]; then
            echo "::add-mask::$EVM_RPC_URL"
          fi

      - name: Print secret presence (values never printed)
        run: |
          echo "STAGING_API_URL present:          $([ -n "$STAGING_API_URL" ] && echo yes || echo no)"
          echo "STAGING_APP_URL present:          $([ -n "$STAGING_APP_URL" ] && echo yes || echo no)"
          echo "STAGING_AUTH_TOKEN_SECRET present: $([ -n "$STAGING_AUTH_TOKEN_SECRET" ] && echo yes || echo no)"
          echo "STAGING_DATABASE_URL present:     $([ -n "$STAGING_DATABASE_URL" ] && echo yes || echo no)"
          echo "STAGING_WORKER_ENABLED present:   $([ -n "$STAGING_WORKER_ENABLED" ] && echo yes || echo no)"
          echo "STAGING_EVM_RPC_URL present:      $([ -n "$STAGING_EVM_RPC_URL" ] && echo yes || echo no)"
          echo "STAGING_EVM_CHAIN_ID present:     $([ -n "$STAGING_EVM_CHAIN_ID" ] && echo yes || echo no)"

      - name: Fail clearly if any required secret is missing
        run: |
          missing=()
          [ -z "$STAGING_API_URL" ]          && missing+=("STAGING_API_URL")
          [ -z "$STAGING_APP_URL" ]          && missing+=("STAGING_APP_URL")
          [ -z "$STAGING_AUTH_TOKEN_SECRET" ] && missing+=("STAGING_AUTH_TOKEN_SECRET")
          [ -z "$STAGING_DATABASE_URL" ]     && missing+=("STAGING_DATABASE_URL")
          [ -z "$STAGING_WORKER_ENABLED" ]   && missing+=("STAGING_WORKER_ENABLED")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Required staging secrets are not configured: ${missing[*]}"
            echo "Configure these secrets in the repository Settings > Secrets > Actions."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Validate STAGING_WORKER_ENABLED value
        run: |
          val=$(echo "$STAGING_WORKER_ENABLED" | tr '[:upper:]' '[:lower:]')
          if [[ "$val" != "true" && "$val" != "1" && "$val" != "yes" && "$val" != "enabled" ]]; then
            echo "::error::STAGING_WORKER_ENABLED=$STAGING_WORKER_ENABLED is not a truthy value."
            echo "Accepted values: true, 1, yes, enabled"
            exit 1
          fi
          echo "STAGING_WORKER_ENABLED is truthy: $val"

      - name: Check STAGING_API_URL health endpoint
        run: |
          echo "Checking STAGING_API_URL health endpoint..."
          status=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 3 \
            "${STAGING_API_URL%/}/health" 2>/dev/null || echo "000")
          echo "HTTP status: $status"
          if [[ "$status" != "200" && "$status" != "204" ]]; then
            echo "::error::STAGING_API_URL health check failed (HTTP $status). Staging API is not reachable."
            exit 1
          fi
          echo "STAGING_API_URL health check passed."

      - name: Check STAGING_APP_URL reachability
        run: |
          echo "Checking STAGING_APP_URL reachability..."
          status=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 3 \
            "$STAGING_APP_URL" 2>/dev/null || echo "000")
          echo "HTTP status: $status"
          if [[ "$status" == "000" ]]; then
            echo "::error::STAGING_APP_URL is not reachable."
            exit 1
          fi
          echo "STAGING_APP_URL is reachable (HTTP $status)."

      - name: Generate staging production proof
        run: |
          python scripts/generate_staging_launch_proof.py \
            --mode staging \
            --strict \
            --out artifacts/staging-production-proof/real/summary.json

      - name: Validate proof in strict mode
        run: |
          python scripts/validate_staging_launch_proof.py \
            --strict \
            --proof artifacts/staging-production-proof/real/summary.json

      - name: Print proof summary
        if: always()
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path
          path = Path('artifacts/staging-production-proof/real/summary.json')
          if not path.exists():
              print('Proof file not found.')
              sys.exit(0)
          data = json.loads(path.read_text())
          print(f"staging_launch_ready:      {data.get('staging_launch_ready')}")
          print(f"broad_paid_saas_ready:     {data.get('broad_paid_saas_ready')}")
          print(f"safe_to_sell_broadly_today: {data.get('safe_to_sell_broadly_today')}")
          blockers = data.get('blockers', [])
          if blockers:
              print(f"blockers ({len(blockers)}):")
              for b in blockers:
                  print(f"  - {b}")
          else:
              print("blockers: []")
          PY

      - name: Upload real staging proof artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-production-proof-real
          retention-days: 30
          path: artifacts/staging-production-proof/real/summary.json
