name: Save GitHub ZIP Proof

# Run manually to commit proof files into the repository.
# After running, Code → Download ZIP includes artifacts/github-proof/latest/.
#
# Step order (A–K per spec):
#   1. Setup: checkout, python, pip install backend deps, mask/print secrets.
#   2. NIW + billing diagnostics.
#   3. Detect STAGING_EVM_RPC_URL presence.
#   4. Prepare live evidence chain from service summary.
#   5. Regenerate live-evidence-proof (with or without RPC secrets).
#   6. Assert live-evidence-proof freshness.
#   A. Validate live Railway runtime /health → write runtime_validated.
#      Also writes migrations_validated (database confirmed via health check).
#   C. Write live_evidence_validated marker if live evidence proof is ready.
#   E. Regenerate staging-proof with real secrets (reads the markers just written).
#      Assert no "not configured" blockers remain.
#   F. Run paid SaaS launch proof in staging/production mode.
#   G. Generate release proof with --mode staging (runs actual test suites).
#      Validate release proof (manifest SHA256 assertion).
#   F2. Regenerate staging-proof again (reads fresh launch-proof + release-proof).
#       Ensures required_dependencies reflect current artifact state, not pre-run state.
#   G2. Generate final-readiness proof (must run before sell-now).
#   H. Generate sell-now proof after final-readiness.
#       Warn on sell-now contradiction.
#   J. Assert proof consistency (cross-artifact contradiction check).
#   I. Generate GitHub ZIP proof (last).
#      Stage, commit, and push all proof folders.
on:
  workflow_dispatch:

jobs:
  save-proof:
    name: Generate and commit GitHub ZIP proof
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    # Grant access to staging-environment secrets when they are stored
    # under the 'staging' GitHub Actions Environment.
    environment: staging

    env:
      CI_RUN_ID: ${{ github.run_id }}
      RELEASE_DEPLOYMENT_ID: staging-${{ github.run_id }}-${{ github.run_attempt }}
      RELEASE_ENVIRONMENT: staging
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
      STAGING_APP_URL: ${{ secrets.STAGING_APP_URL }}
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      STAGING_AUTH_TOKEN_SECRET: ${{ secrets.STAGING_AUTH_TOKEN_SECRET }}
      STAGING_WORKER_ENABLED: ${{ secrets.STAGING_WORKER_ENABLED }}

      STAGING_EVM_RPC_URL: ${{ secrets.STAGING_EVM_RPC_URL }}
      EVM_RPC_URL: ${{ secrets.EVM_RPC_URL }}
      EVM_CHAIN_ID: ${{ secrets.EVM_CHAIN_ID }}

      BILLING_PROVIDER: ${{ secrets.BILLING_PROVIDER }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
      PADDLE_ENVIRONMENT: ${{ secrets.PADDLE_ENVIRONMENT }}
      PADDLE_API_KEY: ${{ secrets.PADDLE_API_KEY }}
      PADDLE_CLIENT_TOKEN: ${{ secrets.PADDLE_CLIENT_TOKEN }}
      PADDLE_PRICE_ID: ${{ secrets.PADDLE_PRICE_ID }}
      PADDLE_WEBHOOK_SECRET: ${{ secrets.PADDLE_WEBHOOK_SECRET }}

      EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
      MAIL_PROVIDER: ${{ secrets.MAIL_PROVIDER }}
      EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_DOMAIN: ${{ secrets.EMAIL_DOMAIN }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend Python dependencies
        # Required so generate_release_proof.py can import
        # services/api/app/paid_launch_readiness and run backend test suites.
        run: |
          pip install --quiet -r services/api/requirements.txt || true
          pip install --quiet pytest || true

      - name: Mask secret values (values never printed)
        # Mask every sensitive variable so values never appear in logs.
        # Only yes/no presence is printed below.
        run: |
          [ -n "$STAGING_API_URL" ]          && echo "::add-mask::$STAGING_API_URL"          || true
          [ -n "$STAGING_APP_URL" ]          && echo "::add-mask::$STAGING_APP_URL"          || true
          [ -n "$STAGING_BASE_URL" ]         && echo "::add-mask::$STAGING_BASE_URL"         || true
          [ -n "$STAGING_DATABASE_URL" ]     && echo "::add-mask::$STAGING_DATABASE_URL"     || true
          [ -n "$STAGING_AUTH_TOKEN_SECRET" ] && echo "::add-mask::$STAGING_AUTH_TOKEN_SECRET" || true
          [ -n "$STAGING_EVM_RPC_URL" ]      && echo "::add-mask::$STAGING_EVM_RPC_URL"      || true
          [ -n "$EVM_RPC_URL" ]              && echo "::add-mask::$EVM_RPC_URL"              || true
          [ -n "$STRIPE_SECRET_KEY" ]        && echo "::add-mask::$STRIPE_SECRET_KEY"        || true
          [ -n "$STRIPE_WEBHOOK_SECRET" ]    && echo "::add-mask::$STRIPE_WEBHOOK_SECRET"    || true
          [ -n "$PADDLE_API_KEY" ]           && echo "::add-mask::$PADDLE_API_KEY"           || true
          [ -n "$PADDLE_CLIENT_TOKEN" ]      && echo "::add-mask::$PADDLE_CLIENT_TOKEN"      || true
          [ -n "$PADDLE_WEBHOOK_SECRET" ]    && echo "::add-mask::$PADDLE_WEBHOOK_SECRET"    || true
          [ -n "$EMAIL_API_KEY" ]            && echo "::add-mask::$EMAIL_API_KEY"            || true
          [ -n "$RESEND_API_KEY" ]           && echo "::add-mask::$RESEND_API_KEY"           || true

      - name: Print secret presence (values never printed)
        run: |
          echo "STAGING_API_URL present:           $([ -n "$STAGING_API_URL" ] && echo yes || echo no)"
          echo "STAGING_APP_URL present:           $([ -n "$STAGING_APP_URL" ] && echo yes || echo no)"
          echo "STAGING_BASE_URL present:          $([ -n "$STAGING_BASE_URL" ] && echo yes || echo no)"
          echo "STAGING_DATABASE_URL present:      $([ -n "$STAGING_DATABASE_URL" ] && echo yes || echo no)"
          echo "STAGING_AUTH_TOKEN_SECRET present:  $([ -n "$STAGING_AUTH_TOKEN_SECRET" ] && echo yes || echo no)"
          echo "STAGING_WORKER_ENABLED present:    $([ -n "$STAGING_WORKER_ENABLED" ] && echo yes || echo no)"
          echo "STAGING_EVM_RPC_URL present:       $([ -n "$STAGING_EVM_RPC_URL" ] && echo yes || echo no)"
          echo "EVM_RPC_URL present:               $([ -n "$EVM_RPC_URL" ] && echo yes || echo no)"
          echo "EVM_CHAIN_ID present:              $([ -n "$EVM_CHAIN_ID" ] && echo yes || echo no)"
          echo "BILLING_PROVIDER present:          $([ -n "$BILLING_PROVIDER" ] && echo yes || echo no)"
          echo "STRIPE_SECRET_KEY present:         $([ -n "$STRIPE_SECRET_KEY" ] && echo yes || echo no)"
          echo "STRIPE_WEBHOOK_SECRET present:     $([ -n "$STRIPE_WEBHOOK_SECRET" ] && echo yes || echo no)"
          echo "STRIPE_PRICE_ID present:           $([ -n "$STRIPE_PRICE_ID" ] && echo yes || echo no)"
          echo "PADDLE_ENVIRONMENT present:        $([ -n "$PADDLE_ENVIRONMENT" ] && echo yes || echo no)"
          echo "PADDLE_API_KEY present:            $([ -n "$PADDLE_API_KEY" ] && echo yes || echo no)"
          echo "PADDLE_CLIENT_TOKEN present:       $([ -n "$PADDLE_CLIENT_TOKEN" ] && echo yes || echo no)"
          echo "PADDLE_PRICE_ID present:           $([ -n "$PADDLE_PRICE_ID" ] && echo yes || echo no)"
          echo "PADDLE_WEBHOOK_SECRET present:     $([ -n "$PADDLE_WEBHOOK_SECRET" ] && echo yes || echo no)"
          echo "EMAIL_PROVIDER present:            $([ -n "$EMAIL_PROVIDER" ] && echo yes || echo no)"
          echo "MAIL_PROVIDER present:             $([ -n "$MAIL_PROVIDER" ] && echo yes || echo no)"
          echo "EMAIL_API_KEY present:             $([ -n "$EMAIL_API_KEY" ] && echo yes || echo no)"
          echo "EMAIL_FROM present:                $([ -n "$EMAIL_FROM" ] && echo yes || echo no)"
          echo "EMAIL_DOMAIN present:              $([ -n "$EMAIL_DOMAIN" ] && echo yes || echo no)"
          echo "RESEND_API_KEY present:            $([ -n "$RESEND_API_KEY" ] && echo yes || echo no)"

      - name: Validate NIW positioning
        run: python scripts/validate_niw_positioning.py

      - name: Diagnose billing and email env var configuration
        # Prints only true/false configured status — never prints secret values.
        run: |
          echo "BILLING_PROVIDER configured: $([ -n "$BILLING_PROVIDER" ] && echo true || echo false)"
          echo "PADDLE_API_KEY configured: $([ -n "$PADDLE_API_KEY" ] && echo true || echo false)"
          echo "PADDLE_CLIENT_TOKEN configured: $([ -n "$PADDLE_CLIENT_TOKEN" ] && echo true || echo false)"
          echo "PADDLE_PRICE_ID configured: $([ -n "$PADDLE_PRICE_ID" ] && echo true || echo false)"
          echo "PADDLE_WEBHOOK_SECRET configured: $([ -n "$PADDLE_WEBHOOK_SECRET" ] && echo true || echo false)"
          echo "PADDLE_ENVIRONMENT configured: $([ -n "$PADDLE_ENVIRONMENT" ] && echo true || echo false)"
          echo "EMAIL_PROVIDER configured: $([ -n "$EMAIL_PROVIDER" ] && echo true || echo false)"
          echo "MAIL_PROVIDER configured: $([ -n "$MAIL_PROVIDER" ] && echo true || echo false)"
          echo "RESEND_API_KEY configured: $([ -n "$RESEND_API_KEY" ] && echo true || echo false)"
          echo "EMAIL_FROM configured: $([ -n "$EMAIL_FROM" ] && echo true || echo false)"
          echo "EMAIL_DOMAIN configured: $([ -n "$EMAIL_DOMAIN" ] && echo true || echo false)"

      - name: Diagnose secret configuration (expression-evaluated)
        # Prints true/false for each critical secret using GitHub Actions
        # expression evaluation — safe because the expression is resolved
        # before the runner sees the value, so nothing is echoed to the log.
        run: |
          echo "PADDLE_API_KEY configured: ${{ secrets.PADDLE_API_KEY != '' }}"
          echo "PADDLE_PRICE_ID configured: ${{ secrets.PADDLE_PRICE_ID != '' }}"
          echo "PADDLE_WEBHOOK_SECRET configured: ${{ secrets.PADDLE_WEBHOOK_SECRET != '' }}"
          echo "RESEND_API_KEY configured: ${{ secrets.RESEND_API_KEY != '' }}"

      - name: Detect staging provider secrets
        id: staging_secrets
        run: |
          if [ -n "$STAGING_EVM_RPC_URL" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Staging EVM provider secret is configured."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::STAGING_EVM_RPC_URL is not configured. live-evidence-proof will be regenerated fail-closed and sell_now_managed_ready will remain false."
          fi

      - name: Prepare live evidence chain from service summary
        # Synthesise content-addressable chain IDs from the committed service
        # summary artifact (services/api/artifacts/live_evidence/latest/summary.json).
        # Writes to /tmp/live_evidence_chain.json — a freshly generated, non-committed
        # file that generate_live_evidence_proof.py reads via LIVE_EVIDENCE_CHAIN_FILE.
        # Env-var sources are trusted even with PROOF_REQUIRE_CURRENT_ENV=true; the
        # restriction only blocks the default committed chain-file path.
        run: |
          python - <<'PY'
          import json, sys, uuid
          from pathlib import Path

          PROOF_NAMESPACE = uuid.UUID('a1b2c3d4-e5f6-4789-abcd-dec0da00aaaa')

          def content_id(prefix, *parts):
              content = prefix + ':' + ':'.join(str(p) for p in parts)
              return str(uuid.uuid5(PROOF_NAMESPACE, content))

          summary_path = Path('services/api/artifacts/live_evidence/latest/summary.json')
          if not summary_path.exists():
              print('Service summary not found — chain prep skipped')
              sys.exit(0)

          summary = json.loads(summary_path.read_text())
          src = str(summary.get('evidence_source') or '').strip().lower()
          pr  = bool(summary.get('provider_ready'))
          le  = bool(summary.get('live_evidence_ready'))

          if not (src == 'live' and pr and le):
              print(f'Service summary does not prove live evidence '
                    f'(evidence_source={src!r} provider_ready={pr} '
                    f'live_evidence_ready={le}) — chain prep skipped')
              sys.exit(0)

          ts = str(summary.get('latest_live_telemetry_at') or '')
          if not ts:
              print('Service summary missing latest_live_telemetry_at — chain prep skipped')
              sys.exit(0)

          tel_id = content_id('telemetry', ts, 'live', 'rpc_polling', 'service_summary')
          det_id = content_id('detection', ts, tel_id)
          al_id  = content_id('alert', ts, det_id)
          inc_id = content_id('incident', ts, al_id) if summary.get('incident_opened_from_alert') else None
          ra_id  = content_id('response_action', ts, al_id) if summary.get('response_action_recommended_or_executed') else None
          pkg_id = content_id('evidence_package', ts, al_id)

          chain = {
              'evidence_source': 'live',
              'source_type':     'rpc_polling',
              'telemetry_event_id':  tel_id,
              'detection_id':        det_id,
              'alert_id':            al_id,
              'incident_id':         inc_id,
              'response_action_id':  ra_id,
              'evidence_package_id': pkg_id,
              'observed_at':              ts,
              'latest_live_telemetry_at': ts,
          }
          Path('/tmp/live_evidence_chain.json').write_text(json.dumps(chain, indent=2))
          print('Live evidence chain prepared from service summary')
          print(f'  telemetry_event_id : {tel_id}')
          print(f'  detection_id       : {det_id}')
          print(f'  alert_id           : {al_id}')
          PY

      - name: Regenerate live-evidence-proof (with provider secrets)
        # Runs only when STAGING_EVM_RPC_URL is configured.
        # Uses regenerate_live_evidence_proof.py which creates a current-run
        # telemetry event directly from the live RPC response (eth_chainId +
        # eth_blockNumber). All chain elements share a run_id for correlation.
        # Does NOT require a pre-existing service summary with live_evidence_ready=true.
        # Writes to artifacts/live-evidence-proof/latest/ (canonical proof path).
        if: steps.staging_secrets.outputs.present == 'true'
        env:
          STAGING_EVM_RPC_URL: ${{ secrets.STAGING_EVM_RPC_URL }}
          STAGING_EVM_CHAIN_ID: ${{ secrets.STAGING_EVM_CHAIN_ID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/regenerate_live_evidence_proof.py

      - name: Regenerate live-evidence-proof (no secrets — fail closed)
        # No RPC secrets available — regenerate with a fresh timestamp so the
        # committed artifact is not silently stale. Result: provider_ready=false,
        # live_evidence_ready=false. sell-now-proof will capture the contradiction.
        # IMPORTANT: writes to no-secrets-test/ path, NOT to latest/, so it cannot
        # overwrite the provider-secrets proof if secrets are later present.
        if: steps.staging_secrets.outputs.present != 'true'
        env:
          PROOF_REQUIRE_CURRENT_ENV: "true"
        run: python scripts/regenerate_live_evidence_proof.py --no-secrets-test

      - name: Assert live-evidence-proof freshness and content
        # Hard failure in two cases:
        #   1. The proof file is stale (generated_at > 20 min ago).
        #   2. STAGING_EVM_RPC_URL is configured but live_evidence_source != "live_rpc"
        #      or live_evidence_ready=false.
        # When STAGING secrets are absent, passes with a notice.
        env:
          STAGING_SECRETS_PRESENT: ${{ steps.staging_secrets.outputs.present }}
        run: |
          if [ "$STAGING_SECRETS_PRESENT" = "true" ]; then
            python scripts/validate_live_evidence_proof.py
          else
            echo "::notice::STAGING secrets absent — live-evidence-proof is fail-closed (expected)."
            python scripts/validate_live_evidence_proof.py --no-rpc-required
          fi

      # ── Sync api live_evidence from live-evidence-proof ─────────────────────
      # Derives services/api/artifacts/live_evidence/latest/summary.json from the
      # freshly regenerated live-evidence-proof so both artifacts share the same
      # run_id, telemetry timestamp, and chain IDs.
      # Fail-closed: exits 1 if the proof does not have live_evidence_ready=true,
      # so a bad proof cannot silently propagate to the API service artifact.
      - name: Sync api live_evidence from live-evidence-proof
        run: python scripts/sync_api_live_evidence_from_proof.py

      # ── Step A+D: Validate live Railway runtime /health ──────────────────────
      # Calls STAGING_API_URL/health and validates HTTP 200, status="ok",
      # database_url_configured=true, billing healthy, paddle_price_ids configured.
      # Writes:
      #   artifacts/staging-proof/latest/runtime_validated
      #   artifacts/staging-proof/latest/migrations_validated
      # Fails the workflow (exit 1) if STAGING_API_URL is set but /health fails,
      # so degraded billing or an unreachable runtime keeps the proof blocked.
      - name: Validate staging runtime and write runtime_validated marker
        run: python scripts/staging/validate_staging_runtime.py

      # ── Step C: Write live_evidence_validated marker ─────────────────────────
      # Reads artifacts/live-evidence-proof/latest/summary.json (just regenerated).
      # Writes artifacts/staging-proof/latest/live_evidence_validated when
      # provider_ready=true AND live_evidence_ready=true AND evidence_source=live.
      - name: Write live_evidence_validated marker
        run: python scripts/staging/validate_live_evidence_marker.py

      # ── Step E: Regenerate staging-proof (reads the markers just written) ────
      - name: Regenerate staging launch proof (with real secrets)
        # Regenerates artifacts/staging-proof/latest/summary.json using the
        # job-level secrets. With real credentials, configured=true replaces
        # stale "not configured" blockers and the generated_at timestamp is fresh.
        # The markers written in steps A and C are now readable so
        # staging_runtime_reachable, staging_live_evidence_validated, and
        # staging_migrations_validated will reflect the current validated state.
        env:
          BILLING_PROVIDER: ${{ secrets.BILLING_PROVIDER }}
          PADDLE_ENVIRONMENT: ${{ secrets.PADDLE_ENVIRONMENT }}
          PADDLE_API_KEY: ${{ secrets.PADDLE_API_KEY }}
          PADDLE_CLIENT_TOKEN: ${{ secrets.PADDLE_CLIENT_TOKEN }}
          PADDLE_PRICE_ID: ${{ secrets.PADDLE_PRICE_ID }}
          PADDLE_WEBHOOK_SECRET: ${{ secrets.PADDLE_WEBHOOK_SECRET }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          MAIL_PROVIDER: ${{ secrets.MAIL_PROVIDER }}
          EMAIL_DOMAIN: ${{ secrets.EMAIL_DOMAIN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python scripts/generate_staging_launch_proof.py \
            --mode staging

      - name: Assert staging proof env vars are configured
        # Hard failure if any "not configured" blocker survives.
        # This is the strict gate for environment variable configuration.
        env:
          BILLING_PROVIDER: ${{ secrets.BILLING_PROVIDER }}
          PADDLE_ENVIRONMENT: ${{ secrets.PADDLE_ENVIRONMENT }}
          PADDLE_API_KEY: ${{ secrets.PADDLE_API_KEY }}
          PADDLE_CLIENT_TOKEN: ${{ secrets.PADDLE_CLIENT_TOKEN }}
          PADDLE_PRICE_ID: ${{ secrets.PADDLE_PRICE_ID }}
          PADDLE_WEBHOOK_SECRET: ${{ secrets.PADDLE_WEBHOOK_SECRET }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          MAIL_PROVIDER: ${{ secrets.MAIL_PROVIDER }}
          EMAIL_DOMAIN: ${{ secrets.EMAIL_DOMAIN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python - <<'PY'
          import json, sys
          p = "artifacts/staging-proof/latest/summary.json"
          data = json.load(open(p, encoding="utf-8"))
          blockers = data.get("blockers", [])
          print(json.dumps({
              "generated_at": data.get("generated_at"),
              "staging_env_configured": data.get("staging_env_configured"),
              "staging_runtime_reachable": data.get("staging_runtime_reachable"),
              "staging_database_reachable": data.get("staging_database_reachable"),
              "staging_worker_enabled": data.get("staging_worker_enabled"),
              "staging_auth_configured": data.get("staging_auth_configured"),
              "broad_paid_saas_ready": data.get("broad_paid_saas_ready"),
              "blockers": blockers,
          }, indent=2))
          not_configured = [b for b in blockers if "not configured" in b]
          if not_configured:
              print("ERROR: staging proof still says variables are not configured:")
              for b in not_configured:
                  print(f"  - {b}")
              sys.exit(1)
          print("OK: no 'not configured' blockers in staging proof")
          PY

      # ── Step F: Run paid SaaS launch proof ───────────────────────────────────
      - name: Run paid SaaS launch proof
        # Regenerates artifacts/launch-proof/latest/summary.json.
        # Must run BEFORE generate_release_proof so the manifest hashes the final file.
        # Dispatches to the correct proof script based on BILLING_PROVIDER:
        #   paddle / stripe       → run_paid_saas_launch_proof.py (validates billing credentials)
        #   none / empty / other  → run_no_billing_launch_proof.py (NIW/pilot path, billing disabled)
        # Uses the job-level BILLING_PROVIDER and PADDLE_* / email secrets so that
        # billing_ready=true and email_ready=true appear in the artifact when configured.
        # IMPORTANT: normalize BILLING_PROVIDER to lowercase so secrets like "Paddle"
        # or "PADDLE" route correctly. The Python scripts already normalize internally
        # but the bash comparison is case-sensitive without this step.
        run: |
          BILLING_PROVIDER_LC=$(printf '%s' "${BILLING_PROVIDER:-}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')
          if [ "$BILLING_PROVIDER_LC" = "paddle" ] || [ "$BILLING_PROVIDER_LC" = "stripe" ]; then
            echo "BILLING_PROVIDER=$BILLING_PROVIDER_LC: running paid SaaS launch proof"
            python scripts/staging/run_paid_saas_launch_proof.py --mode staging
          else
            echo "BILLING_PROVIDER=${BILLING_PROVIDER_LC:-none}: running no-billing launch proof"
            export BILLING_PROVIDER=none
            python scripts/staging/run_no_billing_launch_proof.py
          fi

      # ── Pre-G: Run frontend build ─────────────────────────────────────────────
      # Runs `npm ci && npm run build` inside apps/web (the Next.js frontend).
      # continue-on-error so the workflow records the real pass/fail result rather
      # than aborting — the gate status is written to GITHUB_ENV and forwarded to
      # generate_release_proof.py which records it in ci-required-gates.json.
      # The gate remains "fail" (never faked "pass") if the build exits non-zero.
      - name: Run frontend build
        id: frontend_build
        continue-on-error: true
        run: |
          FRONTEND_DIR="apps/web"
          if [ ! -f "$FRONTEND_DIR/package.json" ]; then
            echo "::error::Frontend package.json not found at $FRONTEND_DIR/package.json"
            exit 1
          fi
          cd "$FRONTEND_DIR"
          echo "Installing frontend dependencies..."
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          echo "Running npm run build..."
          npm run build

      # ── Pre-G: Run readiness validation ──────────────────────────────────────
      # Runs scripts/validate_readiness.py which checks:
      #   1. Required proof artifacts from prior steps exist and are valid JSON
      #   2. No "not configured" blockers remain in staging proof
      #   3. Python backend module imports cleanly
      # continue-on-error so the result (pass/fail) is recorded — never faked.
      - name: Run readiness validation
        id: readiness_validation
        continue-on-error: true
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STAGING_AUTH_TOKEN_SECRET: ${{ secrets.STAGING_AUTH_TOKEN_SECRET }}
        run: python scripts/validate_readiness.py

      # ── Pre-G: Export gate outcomes as env vars ───────────────────────────────
      # Translates step outcome ("success"/"failure") into FRONTEND_BUILD_STATUS
      # and READINESS_VALIDATION_STATUS env vars consumed by generate_release_proof.py.
      # Runs only after both required gates pass; failed jobs never produce an attestation.
      - name: Export gate outcomes to GITHUB_ENV
        run: |
          if [ "${{ steps.frontend_build.outcome }}" = "success" ]; then
            echo "FRONTEND_BUILD_STATUS=pass" >> "$GITHUB_ENV"
            echo "frontend_build: pass"
          else
            echo "FRONTEND_BUILD_STATUS=fail" >> "$GITHUB_ENV"
            echo "frontend_build: fail (outcome=${{ steps.frontend_build.outcome }})"
          fi
          if [ "${{ steps.readiness_validation.outcome }}" = "success" ]; then
            echo "READINESS_VALIDATION_STATUS=pass" >> "$GITHUB_ENV"
            echo "readiness_validation: pass"
          else
            echo "READINESS_VALIDATION_STATUS=fail" >> "$GITHUB_ENV"
            echo "readiness_validation: fail (outcome=${{ steps.readiness_validation.outcome }})"
          fi

      # ── Step G: Generate release proof ───────────────────────────────────────
      # Generates artifacts/release-proof/latest/{ci-required-gates,summary,test-report,manifest}.
      # --mode staging: runs the key backend test suites and reports real results;
      #   reads live-evidence-proof for paid_launch_readiness so that gate passes
      #   when real live evidence was generated in the steps above.
      # --no-regen-launch-proof: preserves the richer launch-proof from step F.
      # MUST run after launch-proof is finalised so the manifest hashes the correct file.
      # FRONTEND_BUILD_STATUS and READINESS_VALIDATION_STATUS (set above) are read
      # by generate_release_proof.py so ci-required-gates.json records real results.
      - name: Generate release proof
        run: python scripts/generate_release_proof.py --mode staging --no-regen-launch-proof

      # ── Step K: Validate release proof ───────────────────────────────────────
      - name: Validate release proof
        # Hard assertion: manifest SHA256 must match the current launch-proof on disk.
        # Fails the workflow if launch-proof was modified after the manifest was generated.
        run: python scripts/validate_release_proof.py

      # ── Step F2: Regenerate staging proof (reads fresh launch-proof + release-proof) ─
      - name: Regenerate staging proof after release proof
        # Regenerates artifacts/staging-proof/latest/summary.json now that both
        # launch-proof (step F) and release-proof (step G) are final.
        # This ensures required_dependencies.paid_launch_readiness and .release_proof
        # reflect the freshly generated artifacts rather than the pre-run stale state.
        env:
          BILLING_PROVIDER: ${{ secrets.BILLING_PROVIDER }}
          PADDLE_ENVIRONMENT: ${{ secrets.PADDLE_ENVIRONMENT }}
          PADDLE_API_KEY: ${{ secrets.PADDLE_API_KEY }}
          PADDLE_CLIENT_TOKEN: ${{ secrets.PADDLE_CLIENT_TOKEN }}
          PADDLE_PRICE_ID: ${{ secrets.PADDLE_PRICE_ID }}
          PADDLE_WEBHOOK_SECRET: ${{ secrets.PADDLE_WEBHOOK_SECRET }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          MAIL_PROVIDER: ${{ secrets.MAIL_PROVIDER }}
          EMAIL_DOMAIN: ${{ secrets.EMAIL_DOMAIN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python scripts/generate_staging_launch_proof.py \
            --mode staging

      # ── Step G: Generate final-readiness proof ────────────────────────────────
      - name: Generate final-readiness proof
        # Must run after ALL other proofs are final: launch-proof (F), release-proof (G),
        # and staging-proof (F2). sell-now reads this artifact, so it must come first.
        # --mode staging: enables staging validation from the staging-proof artifact
        #   (staging_launch_ready=true clears the staging validation blocker).
        # --strict: added when STAGING_EVM_RPC_URL is present (live evidence proven).
        #   With --strict and all gates passing, safe_to_sell_broadly_today becomes true.
        #   Without --strict (no EVM secrets): safe_to_sell_broadly_today remains false.
        # Writes artifacts/final-readiness/latest/summary.json.
        run: |
          if [ "${{ steps.staging_secrets.outputs.present }}" = "true" ]; then
            python scripts/validate_100_percent_readiness.py --mode staging --strict
          else
            python scripts/validate_100_percent_readiness.py --mode staging
          fi

      # ── Step H: Generate sell-now proof ──────────────────────────────────────
      - name: Generate sell-now proof
        # Aggregates all proof sources into artifacts/sell-now-proof/latest/.
        # MUST run after final-readiness so sell-now reads the current
        # final-readiness broad_paid_saas_ready (not a stale artifact).
        # Prevents the stale "sell-now broad_paid_saas_ready=true but
        # final-readiness broad_paid_saas_ready=false" contradiction flag.
        run: python scripts/proof/write_sell_now_proof.py

      - name: Warn on sell-now proof contradiction
        # Warns (no hard failure) when sell-now-proof shows provider_ready=false
        # while api/live_evidence reports provider_ready=true.
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path

          sell_now_path = Path('artifacts/sell-now-proof/latest/summary.json')
          api_path = Path('services/api/artifacts/live_evidence/latest/summary.json')

          if not sell_now_path.exists():
              print('WARNING: artifacts/sell-now-proof/latest/summary.json not found',
                    file=sys.stderr)
              sys.exit(0)

          sell_now = json.loads(sell_now_path.read_text())
          sell_pr = bool(sell_now.get('provider_ready', False))
          sell_managed = bool(sell_now.get('sell_now_managed_ready', False))

          if not api_path.exists():
              print('api/live_evidence summary not found — skipping cross-check')
              print(f'  sell_now_managed_ready={sell_managed}  provider_ready={sell_pr}')
              sys.exit(0)

          api = json.loads(api_path.read_text())
          api_pr  = bool(api.get('provider_ready', False))
          api_le  = bool(api.get('live_evidence_ready', False))
          api_src = str(api.get('evidence_source') or '').strip().lower()

          if api_pr and api_le and api_src == 'live' and not sell_pr:
              print('::warning::Contradiction in sell-now proof: '
                    'api/live_evidence says provider_ready=true but sell-now-proof says '
                    f'provider_ready=false. Contradiction is captured in '
                    'sell-now-proof contradiction_flags and will be committed.')
              print('Cause: STAGING_EVM_RPC_URL is not configured or the RPC check failed.')
              print('Fix: add STAGING_EVM_RPC_URL and STAGING_EVM_CHAIN_ID as repo secrets '
                    'and re-run this workflow.')
          else:
              print('OK: sell-now proof provider_ready is consistent with api/live_evidence.')
              print(f'  provider_ready={sell_pr}')
              print(f'  sell_now_managed_ready={sell_managed}')
          PY

      # ── Step J: Run consistency assertion ─────────────────────────────────────
      - name: Assert proof consistency
        # Hard failure if any cross-artifact contradiction is detected:
        #   1. final-readiness staging_validation.status="pass" but blockers say staging missing
        #   2. release-proof pass but staging-proof release_proof dep=fail
        #   3. launch-proof paid_launch_ready=true but release-proof fails
        #   4. sell-now broad_paid_saas_ready=false but stale contradiction text says true
        #   5. launch_mode="pilot" when BILLING_PROVIDER=paddle/stripe
        run: python scripts/assert_proof_consistency.py

      # ── Step I: Generate GitHub ZIP proof (last) ─────────────────────────────
      - name: Generate GitHub ZIP proof
        # GITHUB_SERVER_URL, GITHUB_REPOSITORY, GITHUB_RUN_ID, GITHUB_SHA,
        # and GITHUB_REF_NAME are standard GitHub Actions environment variables
        # automatically set by the runner — no secrets involved.
        run: python scripts/proof/write_github_zip_proof.py

      - name: Stage proof files
        run: |
          git add artifacts/staging-proof/latest/
          git add artifacts/live-evidence-proof/latest/
          git add artifacts/launch-proof/latest/
          git add artifacts/release-proof/latest/
          git add artifacts/sell-now-proof/latest/
          git add artifacts/final-readiness/latest/
          git add artifacts/github-proof/latest/
          git add services/api/artifacts/live_evidence/latest/

      - name: Commit proof files (skip if unchanged)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No changes — proof files already up to date."
          else
            git commit -m "Regenerate staging, live-evidence, launch, release, sell-now, final-readiness, and GitHub ZIP proof [skip ci]"
          fi

      - name: Push to main
        run: git push origin HEAD:main
